name: yms
description: YMS - mini couple PWA
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  url_launcher: ^6.2.5
  font_awesome_flutter: ^10.7.0
  
  # Firebase
  firebase_core: ^3.4.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.2.0
  firebase_auth: ^5.3.0

  # Storage
  shared_preferences: ^2.2.3

  # UI / QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Location
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true